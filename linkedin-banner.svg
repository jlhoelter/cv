<svg xmlns="http://www.w3.org/2000/svg" width="1584" height="396" viewBox="0 0 1584 396">

  <!-- Background: subtle gradient left (slightly warm) to right (zinc-50) -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#e4e4e7"/>
      <stop offset="60%"  stop-color="#f4f4f5"/>
      <stop offset="100%" stop-color="#fafafa"/>
    </linearGradient>
  </defs>
  <rect width="1584" height="396" fill="url(#bg)"/>

  <!-- Horizontal foundation lines — bottom left, fading right -->
  <defs>
    <linearGradient id="linefade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="linegrow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#2dd4bf" stop-opacity="0"/>
      <stop offset="30%"  stop-color="#2dd4bf" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#2dd4bf" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Lines from left, shortening — solid teal, visible under text -->
  <!-- Horizontal lines from photo (x=200, center of banner height=201 → y≈180)
       spreading slightly up and down, all going full width to right edge -->
  <!-- Origin: photo center approx x=200, y=300 in full 396px banner
       Lines fan out horizontally from that point to right edge -->
  <line x1="200" y1="205" x2="1584" y2="205" stroke="#99f6e4" stroke-width="1"/>
  <line x1="200" y1="222" x2="1584" y2="222" stroke="#5eead4" stroke-width="1"/>
  <line x1="200" y1="239" x2="1584" y2="239" stroke="#2dd4bf" stroke-width="1.5"/>
  <line x1="200" y1="256" x2="1584" y2="256" stroke="#14b8a6" stroke-width="1"/>
  <line x1="200" y1="273" x2="1584" y2="273" stroke="#0d9488" stroke-width="1"/>

  <!-- Line 1: three key concepts — strong, dark, weighted -->
  <text
    x="420" y="108"
    font-family="'Geist', 'Inter', system-ui, sans-serif"
    font-size="52" font-weight="500" letter-spacing="-0.01em"
    fill="#18181b">Clarity, focus and decision capability</text>

  <!-- Line 2: the consequence — lighter, quieter -->
  <text
    x="420" y="172"
    font-family="'Geist', 'Inter', system-ui, sans-serif"
    font-size="48" font-weight="300" letter-spacing="-0.01em"
    fill="#71717a">as the foundation of <tspan fill="#0f766e" font-weight="400">excellent product organizations</tspan></text>

</svg>
